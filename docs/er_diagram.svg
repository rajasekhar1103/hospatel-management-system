<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="420" viewBox="0 0 800 420">
  <style>
    .box { fill:#fff; stroke:#333; stroke-width:2 }
    .title { font: bold 14px sans-serif }
    .field { font: 12px monospace }
    .rel { stroke:#666; stroke-width:2 }
  </style>

  <!-- Users table -->
  <rect x="40" y="40" width="260" height="140" rx="6" class="box"/>
  <text x="60" y="62" class="title">Users</text>
  <text x="60" y="86" class="field">id : INTEGER (PK)</text>
  <text x="60" y="106" class="field">name : TEXT</text>
  <text x="60" y="126" class="field">email : TEXT (UNIQUE)</text>
  <text x="60" y="146" class="field">password_hash : TEXT</text>
  <text x="60" y="166" class="field">role : TEXT (admin/doctor/patient)</text>

  <!-- Appointments table -->
  <rect x="420" y="40" width="320" height="160" rx="6" class="box"/>
  <text x="440" y="62" class="title">Appointments</text>
  <text x="440" y="86" class="field">id : INTEGER (PK)</text>
  <text x="440" y="106" class="field">patient_id : INTEGER (FK → Users.id)</text>
  <text x="440" y="126" class="field">doctor_id : INTEGER (FK → Users.id)</text>
  <text x="440" y="146" class="field">scheduled_at : DATETIME</text>
  <text x="440" y="166" class="field">status : TEXT</text>
  <text x="440" y="186" class="field">notes : TEXT</text>

  <!-- Relations -->
  <line x1="300" y1="120" x2="420" y2="120" class="rel" marker-end="url(#arrow)"/>
  <text x="330" y="110" font-size="12" fill="#333">1..*</text>
  <text x="360" y="135" font-size="12" fill="#333">patient</text>

  <line x1="300" y1="150" x2="420" y2="150" class="rel" marker-end="url(#arrow)"/>
  <text x="330" y="140" font-size="12" fill="#333">1..*</text>
  <text x="360" y="165" font-size="12" fill="#333">doctor</text>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#666" />
    </marker>
  </defs>

</svg>
